name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install WASM workloads
        run: dotnet workload restore wasm/DwgDxf.csproj

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright headless shell
        # GitHub-hosted runners already ship Chromium, but Vitest's Playwright
        # provider still needs a matching browser build. The headless shell is
        # the smallest supported option for our headless CI run.
        run: bunx playwright install chromium --with-deps --only-shell

      - name: Build WASM
        run: bun run build:wasm

      - name: Download test fixtures
        run: bun run test:download-fixtures

      - name: Run tests
        run: bun run test
